# Fly.io configuration for the ToM benchmark dashboard.
# Generate this app with: `fly launch --no-deploy --copy-config --name <your-app-name>`
# Then deploy with: `fly deploy`

app = "tom-benchmark"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8501"

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
